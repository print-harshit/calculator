<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:         #0f0f13;
      --surface:    #1a1a24;
      --surface2:   #22222f;
      --border:     #2e2e40;
      --accent:     #7c6ff7;
      --accent-dim: #3d3880;
      --text:       #e8e8f0;
      --text-muted: #7878a0;
      --btn-num:    #1e1e2c;
      --btn-op:     #26243a;
      --btn-eq:     #5a52e0;
      --btn-eq2:    #7c74f5;
      --btn-clear:  #2a1f3d;
      --shadow:     0 24px 64px rgba(0,0,0,0.5);
      --radius:     18px;
      --btn-radius: 14px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      background-image:
        radial-gradient(ellipse 60% 40% at 30% 20%, rgba(124,111,247,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 75% 80%, rgba(90,82,224,0.05) 0%, transparent 50%);
    }

    .calc-wrap {
      width: 340px;
    }

    .calc {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 20px 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Display ── */
    .display {
      background: var(--surface2);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 16px 18px 14px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 4px;
      position: relative;
      overflow: hidden;
    }

    .display::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0.6;
    }

    .expression {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
      min-height: 18px;
      text-align: right;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result {
      font-family: 'JetBrains Mono', monospace;
      font-size: 40px;
      font-weight: 300;
      color: var(--text);
      text-align: right;
      line-height: 1;
      letter-spacing: -1px;
      transition: font-size 0.15s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result.shrink { font-size: 28px; }
    .result.shrink2 { font-size: 20px; }

    /* ── History pills ── */
    .history {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 2px;
    }
    .history::-webkit-scrollbar { display: none; }

    .history-pill {
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .history-pill:hover {
      border-color: var(--accent-dim);
      color: var(--text);
    }

    /* ── Buttons grid ── */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }

    button {
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 500;
      height: 60px;
      border: none;
      border-radius: var(--btn-radius);
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.08s ease, background 0.12s ease;
      outline: none;
      letter-spacing: 0.2px;
      position: relative;
      overflow: hidden;
      color: var(--text);
      border: 1px solid transparent;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.08s;
    }
    button:active::after { background: rgba(255,255,255,0.06); }
    button:active { transform: scale(0.95); }

    /* number buttons */
    .btn-num {
      background: var(--btn-num);
      border-color: var(--border);
    }
    .btn-num:hover { filter: brightness(1.18); }

    /* operator buttons */
    .btn-op {
      background: var(--btn-op);
      color: var(--accent);
      border-color: var(--accent-dim);
      font-size: 20px;
    }
    .btn-op:hover { background: #2f2c48; }

    /* equals */
    .btn-eq {
      background: linear-gradient(145deg, var(--btn-eq2), var(--btn-eq));
      color: #fff;
      font-size: 22px;
      border-color: transparent;
      box-shadow: 0 4px 16px rgba(92,80,224,0.35);
    }
    .btn-eq:hover { filter: brightness(1.12); }

    /* clear / modifier */
    .btn-clear {
      background: var(--btn-clear);
      color: #c084fc;
      border-color: #4a2d6a;
    }
    .btn-clear:hover { filter: brightness(1.18); }

    .btn-zero { grid-column: span 2; border-radius: var(--btn-radius); }

    /* Mode toggle */
    .mode-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2px;
    }
    .mode-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .mode-toggle {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px;
    }
    .mode-toggle button {
      height: 24px;
      width: 40px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 16px;
      letter-spacing: 0.4px;
      background: transparent;
      color: var(--text-muted);
      border: none;
    }
    .mode-toggle button.active {
      background: var(--accent);
      color: #fff;
      box-shadow: none;
    }
    .mode-toggle button:active { transform: none; }

    /* Scientific extras */
    .sci-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }
    .sci-buttons button {
      height: 46px;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-sci {
      background: #16182a;
      color: #a78bfa;
      border: 1px solid #2a2845;
    }
    .btn-sci:hover { filter: brightness(1.2); }

    .hidden { display: none; }
  </style>
</head>
<body>

<div class="calc-wrap">
  <div class="calc">

    <!-- Mode row -->
    <div class="mode-row">
      <span class="mode-label">Calculator</span>
      <div class="mode-toggle">
        <button id="mode-basic" class="active" onclick="setMode('basic')">Basic</button>
        <button id="mode-sci" onclick="setMode('sci')">Sci</button>
      </div>
    </div>

    <!-- Display -->
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <!-- History -->
    <div class="history" id="history"></div>

    <!-- Scientific buttons -->
    <div class="sci-buttons hidden" id="sci-panel">
      <button class="btn-sci" onclick="sciFunc('sin')">sin</button>
      <button class="btn-sci" onclick="sciFunc('cos')">cos</button>
      <button class="btn-sci" onclick="sciFunc('tan')">tan</button>
      <button class="btn-sci" onclick="sciFunc('log')">log</button>
      <button class="btn-sci" onclick="sciFunc('ln')">ln</button>
      <button class="btn-sci" onclick="sciFunc('sqrt')">√</button>
      <button class="btn-sci" onclick="sciFunc('sq')">x²</button>
      <button class="btn-sci" onclick="sciFunc('inv')">1/x</button>
      <button class="btn-sci" onclick="inputChar('(')">(</button>
      <button class="btn-sci" onclick="inputChar(')')">)</button>
      <button class="btn-sci" onclick="inputChar('Math.PI')">π</button>
      <button class="btn-sci" onclick="inputChar('Math.E')">e</button>
    </div>

    <!-- Main buttons -->
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-clear" onclick="toggleSign()">+/−</button>
      <button class="btn-clear" onclick="percent()">%</button>
      <button class="btn-op"    onclick="inputOp('/')">÷</button>

      <button class="btn-num" onclick="inputDigit('7')">7</button>
      <button class="btn-num" onclick="inputDigit('8')">8</button>
      <button class="btn-num" onclick="inputDigit('9')">9</button>
      <button class="btn-op"  onclick="inputOp('*')">×</button>

      <button class="btn-num" onclick="inputDigit('4')">4</button>
      <button class="btn-num" onclick="inputDigit('5')">5</button>
      <button class="btn-num" onclick="inputDigit('6')">6</button>
      <button class="btn-op"  onclick="inputOp('-')">−</button>

      <button class="btn-num" onclick="inputDigit('1')">1</button>
      <button class="btn-num" onclick="inputDigit('2')">2</button>
      <button class="btn-num" onclick="inputDigit('3')">3</button>
      <button class="btn-op"  onclick="inputOp('+')">+</button>

      <button class="btn-num btn-zero" onclick="inputDigit('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-eq"  onclick="calculate()">=</button>
    </div>

  </div>
</div>

<script>
  let expr      = '';
  let display   = '0';
  let justCalcd = false;
  let history   = [];

  const $expr   = document.getElementById('expression');
  const $result = document.getElementById('result');
  const $hist   = document.getElementById('history');
  const $sci    = document.getElementById('sci-panel');

  function setMode(m) {
    document.getElementById('mode-basic').classList.toggle('active', m === 'basic');
    document.getElementById('mode-sci').classList.toggle('active', m === 'sci');
    $sci.classList.toggle('hidden', m === 'basic');
  }

  function updateDisplay() {
    $result.textContent = display;
    $result.classList.remove('shrink', 'shrink2');
    if (display.length > 14) $result.classList.add('shrink2');
    else if (display.length > 9) $result.classList.add('shrink');
    const pretty = expr
      .replace(/\*/g, '×').replace(/\//g, '÷')
      .replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e');
    $expr.textContent = pretty;
  }

  function inputDigit(d) {
    if (justCalcd) { expr = ''; justCalcd = false; }
    if (display === '0' && d !== '.') display = d;
    else display += d;
    expr += d;
    updateDisplay();
  }

  function inputDot() {
    if (justCalcd) { expr = '0'; display = '0'; justCalcd = false; }
    const parts = expr.split(/[\+\-\*\/]/);
    const cur   = parts[parts.length - 1];
    if (cur.includes('.')) return;
    if (!cur) { expr += '0'; display += '0'; }
    expr    += '.';
    display += '.';
    updateDisplay();
  }

  function inputOp(op) {
    justCalcd = false;
    const last = expr.slice(-1);
    if (['+','-','*','/'].includes(last)) expr = expr.slice(0,-1);
    expr += op;
    display = op === '*' ? '×' : op === '/' ? '÷' : op;
    updateDisplay();
  }

  function inputChar(ch) {
    if (justCalcd) { expr = ''; justCalcd = false; }
    expr += ch;
    const pretty = ch.replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e');
    display = pretty;
    updateDisplay();
  }

  function sciFunc(fn) {
    if (justCalcd) {
      const val = expr || display;
      switch(fn) {
        case 'sin':  expr = `Math.sin(${val})`; break;
        case 'cos':  expr = `Math.cos(${val})`; break;
        case 'tan':  expr = `Math.tan(${val})`; break;
        case 'log':  expr = `Math.log10(${val})`; break;
        case 'ln':   expr = `Math.log(${val})`; break;
        case 'sqrt': expr = `Math.sqrt(${val})`; break;
        case 'sq':   expr = `Math.pow(${val},2)`; break;
        case 'inv':  expr = `(1/(${val}))`; break;
      }
    } else {
      switch(fn) {
        case 'sin':  expr = `Math.sin(${expr||0})`; break;
        case 'cos':  expr = `Math.cos(${expr||0})`; break;
        case 'tan':  expr = `Math.tan(${expr||0})`; break;
        case 'log':  expr = `Math.log10(${expr||0})`; break;
        case 'ln':   expr = `Math.log(${expr||0})`; break;
        case 'sqrt': expr = `Math.sqrt(${expr||0})`; break;
        case 'sq':   expr = `Math.pow(${expr||0},2)`; break;
        case 'inv':  expr = `(1/(${expr||0}))`; break;
      }
    }
    calculate(true);
  }

  function calculate(keepExpr) {
    if (!expr) return;
    try {
      // eslint-disable-next-line no-new-func
      const raw = Function('"use strict"; return (' + expr + ')')();
      if (!isFinite(raw)) { display = 'Error'; $expr.textContent = ''; expr = ''; updateDisplay(); return; }
      const pretty = expr.replace(/\*/g,'×').replace(/\//g,'÷').replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e');
      addHistory(pretty + ' = ' + fmt(raw));
      display = fmt(raw);
      if (!keepExpr) { expr = String(raw); justCalcd = true; }
      updateDisplay();
    } catch(e) {
      display = 'Error';
      expr = '';
      updateDisplay();
    }
  }

  function fmt(n) {
    if (Number.isInteger(n) && Math.abs(n) < 1e15) return String(n);
    const s = parseFloat(n.toPrecision(10)).toString();
    return s;
  }

  function clearAll() {
    expr = ''; display = '0'; justCalcd = false;
    updateDisplay();
  }

  function toggleSign() {
    if (display === '0' || display === 'Error') return;
    if (expr.startsWith('-')) { expr = expr.slice(1); display = display.slice(1); }
    else { expr = '-' + expr; display = '-' + display; }
    updateDisplay();
  }

  function percent() {
    try {
      // eslint-disable-next-line no-new-func
      const val = Function('"use strict"; return (' + expr + ')')() / 100;
      expr = String(val); display = fmt(val);
      updateDisplay();
    } catch(e) {}
  }

  function addHistory(str) {
    history.unshift(str);
    if (history.length > 8) history.pop();
    renderHistory();
  }

  function renderHistory() {
    $hist.innerHTML = '';
    history.forEach(h => {
      const pill = document.createElement('div');
      pill.className = 'history-pill';
      pill.textContent = h;
      pill.title = 'Click to restore result';
      pill.onclick = () => {
        const res = h.split(' = ')[1];
        if (res) { display = res; expr = res; justCalcd = true; updateDisplay(); }
      };
      $hist.appendChild(pill);
    });
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') inputOp('+');
    else if (e.key === '-') inputOp('-');
    else if (e.key === '*') inputOp('*');
    else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') {
      expr    = expr.slice(0, -1);
      display = expr || '0';
      updateDisplay();
    }
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '%') percent();
  });
</script>
</body>
</html>
